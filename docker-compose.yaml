services:
  database:
    image: postgres:17-alpine
    container_name: avatar_postgres_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      # Named volume for persistent data
      - postgres_data:/var/lib/postgresql/data
      # Bind mount to automatically run initialization scripts
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: avatar_fastapi_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - ${API_PORT:-8000}:8000
    volumes:
      - ./backend/app:/backend/app # dev mode
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload # dev mode - override CMD
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
